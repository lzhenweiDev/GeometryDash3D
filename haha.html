<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER BIKE V22: THE RIDER'S GRIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010205; font-family: 'Rajdhani', sans-serif; user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; outline: none; }
        
        #fx-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8) 100%),
                        repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);
        }

        #ui-dashboard {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 20; pointer-events: none;
            display: flex; gap: 50px; background: rgba(0, 10, 20, 0.9); padding: 15px 50px;
            border: 2px solid #00f3ff; border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5), inset 0 0 15px rgba(0, 243, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .stat-group { text-align: center; display: flex; flex-direction: column; }
        .stat-label { font-size: 1rem; color: #00f3ff; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; margin-bottom: 2px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 3rem; color: #fff; text-shadow: 0 0 15px #fff; font-weight: 900; }
        .speed-val { color: #ff007f; text-shadow: 0 0 15px #ff007f; }

        #boost-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,243,255,0.4) 0%, transparent 80%); opacity: 0; z-index: 15; pointer-events: none; transition: opacity 0.15s ease-out; mix-blend-mode: screen; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ff0033; opacity: 0; z-index: 50; pointer-events: none; transition: opacity 0.1s; mix-blend-mode: overlay; }

        .menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 2, 5, 0.9); z-index: 100; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; backdrop-filter: blur(8px);
            pointer-events: auto;
        }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 5.5rem; color: #fff; text-shadow: 0 0 30px #00f3ff; margin: 0 0 10px 0; letter-spacing: 5px; }
        .subtitle { font-size: 1.5rem; color: #ff007f; letter-spacing: 3px; margin-bottom: 40px; animation: pulse 1s infinite alternate; }
        
        .controls-info { background: rgba(0,0,0,0.8); padding: 25px 40px; border-radius: 10px; color: #ddd; font-size: 1.3rem; line-height: 1.8; border: 1px solid #00f3ff; margin-bottom: 40px; box-shadow: inset 0 0 20px rgba(0,243,255,0.2);}
        .controls-info span { color: #fdf500; font-weight: bold; }

        .btn {
            background: #000; color: #00f3ff; font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900;
            padding: 25px 80px; border: 4px solid #00f3ff; border-radius: 10px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 4px; transition: 0.2s; box-shadow: 0 0 30px rgba(0,243,255,0.4), inset 0 0 15px rgba(0,243,255,0.2);
            pointer-events: auto; z-index: 1000; position: relative;
        }
        .btn:hover { background: #00f3ff; color: #000; box-shadow: 0 0 60px #00f3ff; transform: scale(1.05); }
        .btn:active { transform: scale(0.95); background: #fff; border-color: #fff; box-shadow: 0 0 100px #fff; }

        .btn-red { border-color: #ff0033; color: #ff0033; box-shadow: 0 0 30px rgba(255,0,51,0.4); }
        .btn-red:hover { background: #ff0033; color: #fff; box-shadow: 0 0 50px #ff0033; }

        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="game-container" tabindex="0"></div>
    <div id="fx-layer"></div>
    <div id="boost-flash"></div>
    <div id="damage-flash"></div>

    <div id="ui-dashboard">
        <div class="stat-group">
            <div class="stat-label">DISTANZ</div>
            <div class="stat-value" id="dist-val">00000</div>
        </div>
        <div class="stat-group">
            <div class="stat-label">VELOCITY</div>
            <div class="stat-value speed-val" id="speed-val">1.0X</div>
        </div>
    </div>

    <div id="start-screen" class="menu-screen">
        <h1>CYBER BIKE</h1>
        <div class="subtitle">THE RIDER'S GRIP EDITION</div>
        <div class="controls-info">
            <b>MOTORRAD STEUERUNG:</b><br><br>
            <span>[ A ]</span> / <span>[ D ]</span> : Tief in die Kurve legen<br>
            <span>[ W ]</span> : Motorrad-Sprung (Grüne Pfeile)<br>
            <span>[ S ]</span> : Power-Slide (Rote Laser)<br>
        </div>
        <button class="btn" id="btn-start" onclick="startSystem()">START ENGINE</button>
    </div>

    <div id="game-over-screen" class="menu-screen" style="display:none;">
        <h1 style="color: #ff0033; text-shadow: 0 0 40px #ff0033;">SYSTEM CRASH</h1>
        <div class="stat-value" id="final-score" style="font-size: 5rem; color: #fdf500; text-shadow: 0 0 30px #fdf500; margin-bottom: 40px;">0</div>
        <button class="btn btn-red" id="btn-restart" onclick="resetSystem()">REBOOT SYSTEM</button>
    </div>

    <script>
        // =========================================================================
        // 1. SYNTHWAVE AUDIO ENGINE
        // =========================================================================
        const AudioSys = {
            ctx: null, masterGain: null, bgmGain: null,
            isPlayingBGM: false, nextNoteTime: 0, currentStep: 0, timerID: null,
            tempo: 130, notes: [32.70, 32.70, 38.89, 38.89, 41.20, 41.20, 29.14, 29.14],
            
            init() {
                if(this.ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.masterGain = this.ctx.createGain(); this.masterGain.gain.value = 0.5; this.masterGain.connect(this.ctx.destination);
                this.bgmGain = this.ctx.createGain(); this.bgmGain.gain.value = 0.3; this.bgmGain.connect(this.masterGain);
            },
            
            playSFX(freq, type, duration, vol=1, slide=null) {
                if(!this.ctx) return;
                try {
                    let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    if(slide) osc.frequency.exponentialRampToValueAtTime(slide, this.ctx.currentTime + duration);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(this.masterGain);
                    osc.start(); osc.stop(this.ctx.currentTime + duration);
                } catch(e){}
            },
            
            jump() { this.playSFX(200, 'triangle', 0.4, 0.8, 600); },
            slide() { this.playSFX(100, 'sawtooth', 0.4, 0.5, 50); }, 
            coin() { this.playSFX(800, 'square', 0.1, 0.4, 1200); setTimeout(()=>this.playSFX(1200, 'square', 0.2, 0.4, 2000), 80); },
            crash(){ this.playSFX(100, 'sawtooth', 0.8, 1.5, 20); setTimeout(()=>this.playSFX(80, 'square', 0.5, 1.5, 10), 100); },
            warp() { this.playSFX(800, 'sine', 0.3, 0.5, 100); },

            scheduleBGM() {
                if(!this.isPlayingBGM || !this.ctx) return;
                let secondsPerBeat = 60.0 / this.tempo; let stepLength = secondsPerBeat / 4; 
                while(this.nextNoteTime < this.ctx.currentTime + 0.1) {
                    this.playBeat(this.nextNoteTime, this.currentStep);
                    this.nextNoteTime += stepLength; this.currentStep++; if(this.currentStep > 15) this.currentStep = 0;
                }
                this.timerID = requestAnimationFrame(() => this.scheduleBGM());
            },

            playBeat(time, step) {
                if(step % 4 === 0) {
                    let kOsc = this.ctx.createOscillator(); let kGain = this.ctx.createGain();
                    kOsc.frequency.setValueAtTime(150, time); kOsc.frequency.exponentialRampToValueAtTime(0.01, time + 0.2);
                    kGain.gain.setValueAtTime(1.0, time); kGain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
                    kOsc.connect(kGain); kGain.connect(this.bgmGain); kOsc.start(time); kOsc.stop(time + 0.2);
                }
                if(step % 2 !== 0) {
                    let hOsc = this.ctx.createOscillator(); let hGain = this.ctx.createGain(); hOsc.type = 'square'; 
                    let filter = this.ctx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 5000;
                    hGain.gain.setValueAtTime(0.1, time); hGain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
                    hOsc.connect(filter); filter.connect(hGain); hGain.connect(this.bgmGain); hOsc.start(time); hOsc.stop(time + 0.05);
                }
                let note = this.notes[Math.floor(step / 2) % this.notes.length];
                let bOsc = this.ctx.createOscillator(); let bGain = this.ctx.createGain(); bOsc.type = 'sawtooth'; bOsc.frequency.setValueAtTime(note, time);
                let bFilter = this.ctx.createBiquadFilter(); bFilter.type = 'lowpass'; bFilter.frequency.setValueAtTime(200, time); bFilter.frequency.exponentialRampToValueAtTime(1500, time + 0.05); bFilter.frequency.exponentialRampToValueAtTime(200, time + 0.15);
                bGain.gain.setValueAtTime(0.4, time); bGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                bOsc.connect(bFilter); bFilter.connect(bGain); bGain.connect(this.bgmGain); bOsc.start(time); bOsc.stop(time + 0.15);
            },

            startBGM() { if(!this.ctx) this.init(); if(this.isPlayingBGM) return; this.isPlayingBGM = true; this.nextNoteTime = this.ctx.currentTime + 0.1; this.scheduleBGM(); },
            stopBGM() { this.isPlayingBGM = false; cancelAnimationFrame(this.timerID); }
        };

        // =========================================================================
        // 2. HAUPTVARIABLEN & 3D SETUP
        // =========================================================================
        let scene, camera, renderer, clock;
        let isPlaying = false, isGameOver = false;
        let score = 0, startSpeed = 40, currentSpeed = 40, lastSpeedMilestone = 1.0;
        let targetLane = 0, LANE_W = 5;
        let worldChunks = [], obstacles = [], coins = [], particles = [], decoRings = [];
        
        let bikeCockpitGroup, throttleGrip;
        let throttleTargetRot = 0;

        // =========================================================================
        // 3. TEXTUREN & MATERIALIEN
        // =========================================================================
        function createGridTex() {
            let cvs = document.createElement('canvas'); cvs.width = 512; cvs.height = 512; let ctx = cvs.getContext('2d');
            ctx.fillStyle = '#010205'; ctx.fillRect(0, 0, 512, 512); ctx.strokeStyle = '#00f3ff'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, 512, 512);
            let tex = new THREE.CanvasTexture(cvs); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; return tex;
        }

        const floorTex = createGridTex(); floorTex.repeat.set(4, 4);
        const matFloor = new THREE.MeshPhongMaterial({ map: floorTex, shininess: 80 });
        const matBuilding = new THREE.MeshPhongMaterial({ color: 0x020510, emissive: 0x010205, shininess: 30 });
        const matWire = new THREE.MeshBasicMaterial({ color: 0x00f3ff, wireframe: true, transparent: true, opacity: 0.15 });
        const matCoin = new THREE.MeshPhongMaterial({ color: 0xfdf500, emissive: 0x888800, shininess: 100 });
        
        const matHurdle = new THREE.MeshPhongMaterial({ color: 0x00aaff, emissive: 0x003366, shininess: 80 }); 
        const matLaser = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 }); 
        const matLaserPillar = new THREE.MeshPhongMaterial({ color: 0x0033ff, emissive: 0x001166, shininess: 80 }); 
        
        const matArrowG = new THREE.MeshBasicMaterial({ color: 0x39ff14 }); 
        const matArrowR = new THREE.MeshBasicMaterial({ color: 0xff0033 }); 

        // =========================================================================
        // 4. MOTORRAD COCKPIT & HÄNDE
        // =========================================================================
        function buildBikeCockpit() {
            bikeCockpitGroup = new THREE.Group();
            
            // Windschutzscheibe
            let shield = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.5, 1.8, 12, 1, true, 0, Math.PI), new THREE.MeshBasicMaterial({color: 0x00f3ff, transparent: true, opacity: 0.15, wireframe: true}));
            shield.rotation.x = Math.PI / 4; shield.position.set(0, -0.4, -2.8); bikeCockpitGroup.add(shield);

            // Armaturenbrett
            let dash = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.5), new THREE.MeshPhongMaterial({color: 0x111111, emissive: 0x002244, shininess: 50}));
            dash.rotation.x = -Math.PI / 8; dash.position.set(0, -1.2, -1.8); bikeCockpitGroup.add(dash);
            
            // Lenkerstange
            let bar = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3.5, 16), new THREE.MeshPhongMaterial({color: 0x333333}));
            bar.rotation.z = Math.PI / 2; bar.position.set(0, -0.8, -2.0); bikeCockpitGroup.add(bar);
            
            // --- DIE HÄNDE UND GRIFFE ---
            let gripGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.7, 16); 
            let gripMat = new THREE.MeshPhongMaterial({color: 0x111, emissive: 0x00f3ff, emissiveIntensity: 0.2});
            
            // Handschuhe und Arme
            let gloveGeo = new THREE.BoxGeometry(0.25, 0.3, 0.3);
            let gloveMat = new THREE.MeshPhongMaterial({color: 0x0a0a0a, emissive: 0x111111});
            let armGeo = new THREE.CylinderGeometry(0.12, 0.18, 1.5, 8);
            let armMat = new THREE.MeshPhongMaterial({color: 0x000000});

            // LINKS (Fest)
            let lGrip = new THREE.Mesh(gripGeo, gripMat); 
            lGrip.rotation.z = Math.PI / 2; lGrip.position.set(-1.75, -0.8, -2.0);
            
            let lGlove = new THREE.Mesh(gloveGeo, gloveMat);
            lGlove.position.set(-1.75, -0.75, -2.0);
            let lArm = new THREE.Mesh(armGeo, armMat);
            lArm.rotation.x = Math.PI / 2.2; lArm.rotation.z = -0.2;
            lArm.position.set(-1.5, -1.2, -1.0);
            
            bikeCockpitGroup.add(lGrip, lGlove, lArm);

            // RECHTS (Gasgriff - Dreht sich!)
            throttleGrip = new THREE.Mesh(gripGeo, gripMat); 
            throttleGrip.rotation.z = Math.PI / 2; 
            throttleGrip.position.set(1.75, -0.8, -2.0);
            
            let rGlove = new THREE.Mesh(gloveGeo, gloveMat);
            // Handschuh ist Teil des Griffs, damit er sich mitdreht!
            rGlove.position.set(0, 0.05, 0); 
            rGlove.rotation.z = -Math.PI / 2;
            throttleGrip.add(rGlove); 
            
            let rArm = new THREE.Mesh(armGeo, armMat);
            rArm.rotation.x = Math.PI / 2.2; rArm.rotation.z = 0.2;
            rArm.position.set(1.5, -1.2, -1.0);
            
            bikeCockpitGroup.add(throttleGrip, rArm);

            camera.add(bikeCockpitGroup);
        }

        // =========================================================================
        // 5. SPIELER LOGIK (Kamera, Bike Movement & Leaning)
        // =========================================================================
        const Player = {
            yBase: 2.8, yDuck: 1.0, yVelocity: 0, gravity: -90, jumpForce: 32,
            isJumping: false, isDucking: false, duckTimer: 0,
            
            update(dt) {
                // Sanftes aber schnelles Lenken
                let diff = targetLane * LANE_W - camera.position.x;
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, targetLane * LANE_W, 12 * dt);
                
                // Verbessertes Leaning (In die Kurve legen)
                let tilt = diff * -0.08; // Kräftigere Neigung
                camera.rotation.z = THREE.MathUtils.lerp(camera.rotation.z, tilt, 12 * dt);
                
                // Bike neigt sich noch extremer als die Kamera für mehr Dynamik
                bikeCockpitGroup.rotation.z = THREE.MathUtils.lerp(bikeCockpitGroup.rotation.z, tilt * 1.5, 12 * dt);
                
                // Gasgriff (Throttle) Rotation! Hand dreht sich sichtbar mit.
                throttleGrip.rotation.x = THREE.MathUtils.lerp(throttleGrip.rotation.x, throttleTargetRot, 6 * dt);

                if(this.isJumping) {
                    this.yVelocity += this.gravity * dt; camera.position.y += this.yVelocity * dt;
                    bikeCockpitGroup.position.y = THREE.MathUtils.lerp(bikeCockpitGroup.position.y, -0.3, 10 * dt);
                    bikeCockpitGroup.rotation.x = THREE.MathUtils.lerp(bikeCockpitGroup.rotation.x, -0.2, 10 * dt);
                    if(camera.position.y <= this.yBase) { camera.position.y = this.yBase; this.isJumping = false; this.yVelocity = 0; bikeCockpitGroup.position.y = -0.5; }
                } else if (this.isDucking) {
                    camera.position.y = THREE.MathUtils.lerp(camera.position.y, this.yDuck, 20 * dt); this.duckTimer -= dt;
                    bikeCockpitGroup.position.y = THREE.MathUtils.lerp(bikeCockpitGroup.position.y, 0.8, 10 * dt);
                    bikeCockpitGroup.rotation.x = THREE.MathUtils.lerp(bikeCockpitGroup.rotation.x, 0.4, 10 * dt);
                    if(Math.random() > 0.3) spawnSparks(camera.position.x + (Math.random()-0.5)*2, 0.1, camera.position.z - 2);
                    if(this.duckTimer <= 0) this.isDucking = false;
                } else {
                    camera.position.y = THREE.MathUtils.lerp(camera.position.y, this.yBase, 15 * dt);
                    bikeCockpitGroup.position.y = THREE.MathUtils.lerp(bikeCockpitGroup.position.y, 0, 10 * dt);
                    bikeCockpitGroup.rotation.x = THREE.MathUtils.lerp(bikeCockpitGroup.rotation.x, 0, 10 * dt);
                }
            },
            
            jump() { if(!this.isJumping && !this.isDucking) { this.isJumping = true; this.yVelocity = this.jumpForce; AudioSys.jump(); } },
            duck() { if(!this.isJumping) { this.isDucking = true; this.duckTimer = 0.8; AudioSys.slide(); } else { this.yVelocity = -60; } },
            moveLeft() { targetLane = Math.max(-1, targetLane - 1); }, 
            moveRight() { targetLane = Math.min(1, targetLane + 1); },

            getBox() {
                let sizeY = this.isDucking ? 1.2 : 2.2; let posY = this.isDucking ? 0.6 : (camera.position.y - 1.1);
                return new THREE.Box3(new THREE.Vector3(camera.position.x - 0.8, posY - sizeY/2, camera.position.z - 0.8), new THREE.Vector3(camera.position.x + 0.8, posY + sizeY/2, camera.position.z + 0.8));
            }
        };

        // =========================================================================
        // 6. INPUT STEUERUNG
        // =========================================================================
        window.addEventListener('keydown', (e) => {
            if(!isPlaying || e.repeat) return; 
            let key = e.code;
            if(key === 'KeyA' || key === 'ArrowLeft') Player.moveLeft();
            if(key === 'KeyD' || key === 'ArrowRight') Player.moveRight();
            if(key === 'KeyW' || key === 'ArrowUp' || key === 'Space') Player.jump();
            if(key === 'KeyS' || key === 'ArrowDown' || key === 'ShiftLeft') Player.duck();
        });

        window.addEventListener('mousedown', (e) => {
            if(!isPlaying) return;
            if(e.target.tagName === 'BUTTON') return;
            if(e.clientX < window.innerWidth / 2) Player.moveLeft();
            else Player.moveRight();
        });

        // =========================================================================
        // 7. 3D ENGINE & HINTERGRUND
        // =========================================================================
        function init3D() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x010205);
            scene.fog = new THREE.FogExp2(0x010205, 0.005); 

            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
            scene.add(camera); 
            buildBikeCockpit(); 

            renderer = new THREE.WebGLRenderer({ antialias: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('game-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            let dirLight = new THREE.DirectionalLight(0x00f3ff, 1.2); dirLight.position.set(0, 100, -100); scene.add(dirLight);

            let sunGeo = new THREE.CircleGeometry(200, 64); let sunMat = new THREE.MeshBasicMaterial({ color: 0xff007f });
            let sun = new THREE.Mesh(sunGeo, sunMat); sun.position.set(0, 120, -800); scene.add(sun);

            let hor = new THREE.Mesh(new THREE.PlaneGeometry(3000, 2), new THREE.MeshBasicMaterial({color: 0x00f3ff}));
            hor.position.set(0, 0, -799); scene.add(hor);

            let starGeo = new THREE.BufferGeometry(); let starPos = [];
            for(let i=0; i<1500; i++) starPos.push((Math.random()-0.5)*1500, Math.random()*500, -Math.random()*800);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 2.0})));

            for(let i=0; i<12; i++) {
                let ring = new THREE.Mesh(new THREE.TorusGeometry(40, 0.8, 16, 64), new THREE.MeshBasicMaterial({color: 0x0044ff, transparent: true, opacity: 0.3}));
                ring.position.set(0, 20, -i * 80); scene.add(ring); decoRings.push(ring);
            }

            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
            for(let i=0; i<20; i++) spawnWorldChunk(-i * 20);
            clock = new THREE.Clock();
        }

        // =========================================================================
        // 8. WELTGENERIERUNG & HINDERNISSE
        // =========================================================================
        const chunkLength = 20;

        function createArrow(isUp, colorMat) {
            let geo = new THREE.ConeGeometry(1.0, 2.5, 4); let mesh = new THREE.Mesh(geo, colorMat);
            if(!isUp) mesh.rotation.x = Math.PI; return mesh;
        }

        function spawnWorldChunk(zPos) {
            let chunk = new THREE.Group(); chunk.position.z = zPos;
            
            let floor = new THREE.Mesh(new THREE.PlaneGeometry(120, chunkLength), matFloor); 
            floor.rotation.x = -Math.PI / 2; chunk.add(floor);

            let w = (Math.random()*25)+20; let d = (Math.random()*25)+20; let h = (Math.random()*150)+60;
            let b1 = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matBuilding); b1.add(new THREE.Mesh(new THREE.BoxGeometry(w+0.5, h+0.5, d+0.5), matWire)); b1.position.set(-50-(Math.random()*20), h/2, 0); chunk.add(b1);
            let b2 = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matBuilding); b2.add(new THREE.Mesh(new THREE.BoxGeometry(w+0.5, h+0.5, d+0.5), matWire)); b2.position.set(50+(Math.random()*20), h/2, 0); chunk.add(b2);

            scene.add(chunk); worldChunks.push(chunk);
            if(zPos < -100) generateObstacles(zPos);
        }

        function generateObstacles(zBase) {
            let numObs = Math.random() > 0.4 ? 2 : 1; 
            let usedLanes = [];

            for(let i=0; i<numObs; i++) {
                let lane = Math.floor(Math.random()*3) - 1; 
                if(usedLanes.includes(lane)) continue; usedLanes.push(lane);
                
                let actualZ = zBase + (Math.random() - 0.5) * (chunkLength - 8); 
                let actualX = lane * LANE_W;
                
                let type = Math.floor(Math.random() * 2); 
                let obsMesh = new THREE.Group(); let bBox;

                if(type === 0) { 
                    let h = new THREE.Mesh(new THREE.BoxGeometry(LANE_W-0.5, 1.5, 1.5), matHurdle); 
                    h.position.set(0, 0.75, 0); obsMesh.add(h);
                    let arr = createArrow(true, matArrowG); arr.position.set(0, 4.5, 0); obsMesh.add(arr);
                    bBox = new THREE.Box3(new THREE.Vector3(-LANE_W/2, 0, -0.75), new THREE.Vector3(LANE_W/2, 1.5, 0.75));
                    obstacles.push({ mesh: obsMesh, localBox: bBox, z: actualZ, lane: lane, arrow: arr, aStart: 4.5 });
                } 
                else if(type === 1) { 
                    let p1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5.0, 0.5), matLaserPillar); p1.position.set(-LANE_W/2 + 0.5, 2.5, 0);
                    let p2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5.0, 0.5), matLaserPillar); p2.position.set(LANE_W/2 - 0.5, 2.5, 0);
                    let laser = new THREE.Mesh(new THREE.BoxGeometry(LANE_W, 0.8, 0.5), matLaser); laser.position.set(0, 3.0, 0);
                    obsMesh.add(p1, p2, laser);
                    let arr = createArrow(false, matArrowR); arr.position.set(0, 6.0, 0); obsMesh.add(arr);
                    
                    bBox = new THREE.Box3(new THREE.Vector3(-LANE_W/2, 2.0, -0.25), new THREE.Vector3(LANE_W/2, 20.0, 0.25));
                    obstacles.push({ mesh: obsMesh, localBox: bBox, z: actualZ, lane: lane, arrow: arr, aStart: 6.0 });
                }

                obsMesh.position.set(actualX, 0, actualZ); scene.add(obsMesh);
            }

            let freeLanes = [-1, 0, 1].filter(l => !usedLanes.includes(l));
            if(freeLanes.length > 0) {
                let coinLane = freeLanes[Math.floor(Math.random() * freeLanes.length)];
                for(let i=0; i<5; i++) {
                    let cm = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 1.0), matCoin);
                    cm.position.set(coinLane * LANE_W, 1.5, zBase - (i*3));
                    scene.add(cm); coins.push({ m: cm, z: zBase - (i*3), coll: false });
                }
            }
        }

        // =========================================================================
        // 9. EFFEKTE & FUNKEN
        // =========================================================================
        function spawnSparks(x, y, z) {
            const expMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            for(let i=0; i<4; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), expMat); p.position.set(x, y, z); scene.add(p);
                particles.push({ m: p, vx: (Math.random()-0.5)*15, vy: Math.random()*15, vz: Math.random()*15, life: 0.6 });
            }
        }

        function spawnExplosion(x, y, z) {
            const expMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            for(let i=0; i<12; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), expMat); p.position.set(x, y, z); scene.add(p);
                particles.push({ m: p, vx: (Math.random()-0.5)*30, vy: (Math.random()-0.5)*30, vz: (Math.random()-0.5)*30, life: 1.0 });
            }
        }

        function updateEffects(dt) {
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.m.position.x += p.vx * dt; p.m.position.y += p.vy * dt; p.m.position.z += p.vz * dt;
                p.m.scale.multiplyScalar(0.9); p.life -= dt * 2;
                if(p.life <= 0) { scene.remove(p.m); particles.splice(i, 1); }
            }
            decoRings.forEach(r => { 
                r.position.z += currentSpeed * dt * 0.8; 
                if(r.position.z > camera.position.z + 40) r.position.z = camera.position.z - 800; 
                r.rotation.z += 0.8 * dt; 
            });
            let time = clock.getElapsedTime();
            obstacles.forEach(obs => { if(obs.arrow) obs.arrow.position.y = obs.aStart + Math.sin(time * 8) * 0.5; });
        }

        function triggerBoostFlash() {
            let flash = document.getElementById('boost-flash'); flash.style.opacity = '1';
            AudioSys.warp(); setTimeout(() => flash.style.opacity = '0', 250);
            
            // DIE HAND GIBT SICHTBAR GAS
            throttleTargetRot = Math.PI / 4; 
            setTimeout(() => throttleTargetRot = 0, 600); 
        }

        // =========================================================================
        // 10. GAME LOOP & KOLLISION
        // =========================================================================
        function animate() {
            requestAnimationFrame(animate);
            let dt = Math.min(clock.getDelta(), 0.05);

            if(isPlaying) {
                currentSpeed += 0.8 * dt; 
                let speedMult = currentSpeed / startSpeed;
                
                if(speedMult >= lastSpeedMilestone + 1.0) {
                    lastSpeedMilestone = Math.floor(speedMult);
                    triggerBoostFlash();
                }

                document.getElementById('speed-val').innerText = speedMult.toFixed(1) + "X";

                camera.position.z -= currentSpeed * dt;
                score += currentSpeed * dt * 0.1;
                document.getElementById('dist-val').innerText = Math.floor(score).toString().padStart(5, '0');

                Player.update(dt);
                updateEffects(dt);

                let lastChunkZ = worldChunks[worldChunks.length-1].position.z;
                if(camera.position.z - 200 < lastChunkZ) spawnWorldChunk(lastChunkZ - chunkLength);
                if(worldChunks[0].position.z > camera.position.z + 40) { scene.remove(worldChunks[0]); worldChunks.shift(); }

                checkCollisions();
            }
            coins.forEach(c => { if(!c.coll) { c.m.rotation.x += 4*dt; c.m.rotation.y += 5*dt; } });
            renderer.render(scene, camera);
        }

        function checkCollisions() {
            let pBox = Player.getBox();
            for(let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                if(obs.z > camera.position.z + 10) { scene.remove(obs.mesh); obstacles.splice(i, 1); continue; }
                
                if(Math.abs(obs.z - camera.position.z) < 12) {
                    let wBox = obs.localBox.clone(); wBox.translate(obs.mesh.position);
                    if(pBox.intersectsBox(wBox)) return gameOver();
                }
            }

            for(let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i];
                if(c.z > camera.position.z + 10) { scene.remove(c.m); coins.splice(i, 1); continue; }
                
                if(!c.coll && Math.abs(c.z - camera.position.z) < 5) {
                    let dx = Math.abs(c.m.position.x - camera.position.x);
                    let dy = Math.abs(c.m.position.y - camera.position.y);
                    if(dx < 3.0 && dy < 3.5) {
                        c.coll = true; score += 50; AudioSys.coin();
                        spawnExplosion(c.m.position.x, c.m.position.y, c.m.position.z);
                        scene.remove(c.m);
                    }
                }
            }
        }

        // =========================================================================
        // 11. START LOGIK
        // =========================================================================
        window.startSystem = function() {
            AudioSys.init(); 
            setTimeout(() => { AudioSys.startBGM(); }, 50);
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('game-container').focus(); 
            
            camera.position.set(0, Player.yBase, 0);
            targetLane = 0; score = 0; distance = 0; 
            currentSpeed = startSpeed; lastSpeedMilestone = 1.0;
            throttleTargetRot = 0;
            clock.start(); isPlaying = true; isGameOver = false;
        };

        window.resetSystem = function() {
            obstacles.forEach(o => scene.remove(o.mesh)); obstacles = [];
            coins.forEach(c => scene.remove(c.m)); coins = [];
            worldChunks.forEach(w => scene.remove(w)); worldChunks = [];
            for(let i=0; i<20; i++) spawnWorldChunk(-i * 20);
            window.startSystem();
        };

        function gameOver() {
            isPlaying = false; isGameOver = true; 
            AudioSys.stopBGM(); AudioSys.crash();
            document.getElementById('damage-flash').style.opacity = '0.8';
            setTimeout(() => { document.getElementById('damage-flash').style.opacity = '0'; }, 200);
            document.getElementById('final-score').innerText = Math.floor(score);
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        init3D();
        animate();

    </script>
</body>
